body:
  text: 春卿遺稿别集類二宋提要臣等謹案春卿遺稿一巻宋蔣堂撰堂字希魯宜興人大中祥符五年擢進士第仁宗朝厯官左諫議大夫知蘇州改給事中仍知州事後以禮部侍郎致仕因家於蘇事蹟具宋史本傳案胡宿文恭集有堂神道碑稱堂以皇祐六年卒贈吏部侍郎此集題曰春卿仍舉其致仕之官所未詳也碑稱其有高情富清藻多所綴述尤邃於詩其間所得往往清絶善作尺牘思致簡詣時人得之藏為名筆及退居林下神機日旺雖飲食寢處未嘗㤀詩亦天性然有文集二十巻本傳亦稱其好學工文詞尤嗜作詩與碑文合所載文集巻數亦同然原集今不傳此本乃明天啟中堂二十世孫鐄掇拾佚稿而成凡賦一篇詩三十七篇記一篇不及原集十分之一其間惟詩獨多則碑所云尤邃於詩者信也其詩雖興象不深而平正通達無雕鏤纎瑣之習北宋遺集流傳日少錄之亦可備一家焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:81adb8ae951f4649df342154f6772946fc253a398874e384fc4a9931a0cd3f48
