body:
  text: 春卿遺稿宋蔣堂撰北池賦并序姑蘇北池其來古矣昔刺史韋應物詩云海上風雨至逍遥池館涼即其地也韋與白樂天皆有池上之作盛詫其景自韋白没僅三百年寂無歌咏者余景祐丁丑嵗被命守蘇池館必葺常賦北池宴集詩是時端明張安道為邑崑山亦留風什傳刻於石故事在焉去此涉一紀余復佩蘇印感舊成賦聊以寄懐云澤國秀壤句吳故城其野齋之勝者有曲池之著名環碧曉漲迴光晝渟接琅津之餘派分銀潢之一泓危橋􅘳波迅若走鯨虚閣延月清如構瓊乃飛葢之所集靄芳塵之不凝主人一去余去此十二年春草羅生賦詠幾廢嶔嵜未平今茲税鞅之日復慰臨流之情目與景㑹神將喜并是時霽色疎淨羣動紛盈魚在藻以性遂龜遊蓮而體輕禽巢枝而自適蟬得䕃而獨清科斗成文書之象鼃黽有鼓吹之聲以至鷗鳥羣嬉不觸不驚菡萏成列若將若迎崖産并柯之木波孕紫莖之萍灘露沙而金紫垣疊蘚以衣青新蒲鏘鏘挺水心之劍緑竹整整矗羽林之兵别有島檜髙聳枝榦相撑水石結操氷霜薦英若古君子與世寡偶而獨立特行吁可異也噫景之勝者可稱物之秀者可旌故萬狀在目吾得題評者已吾方岸野幘踞風亭觴賔友奏竽笙或獨繭靜釣或扁舟醉乗惟蔗有漿用以析朝酲惟菊有花可以制頺齡而况庭無留事身若遺榮冺得喪乎意表育平粹於心靈姑徜徉於池上亦何慮乎何營謝李兵部詩靈芝坊在杉瀆橋西侍其巷内皇祐五年為侍郎蔣堂立初名難老兵部員外郎李晉卿守郡之明年因所居産靈芝故名黄菌誕丘園靈堪配醴泉至和非我召美化自公宣秀色鄰三逕幽光被一㕓時髦秉筆者為我列羣編前題使君有意飾門閭雅為靈芝揭表初招隠溪邊往還者從茲認得野人居隠圃詩隠圃在靈芝坊蔣樞密堂所居堂兩守吳謝事因家焉自號遂翁圃中有水月菴煙蘿亭風篁亭香巖扃古井貪山等景自賦圃隠詩雅得莵裘地清宜隠者心緑葵才有甲青桂漸成隂獨曳山筇往無勞車駕尋湛然常寂處水月一菴深溪館二首宅南溪上結宇十餘楹名溪館及築南湖臺於水中亦皆有詩皇祐中於溪館知州李仲偃集賔僚賦詩為壽因立靈芝坊胡宿撰溪館記年來納組去林下得身還泚泚清流處童童碧樹間淵魚樂且靜庭鶴壽而閒粗有淮安趣誰同賦小山其二野意本自遂茲溪稱獨醒雲蘿環靜室水石照疎櫺殺竹編書古紉蘭作佩馨王通昔不遇時亦坐汾亭南湖臺三首危臺竹樹間湖水伴深閒清淺採香徑方圓明月灣放魚隨物性載石作家山自喜歸休早全勝賀老還其二嶢榭水中央茲為隠遯鄉小園香寂寂一派曉泱泱煙草碧彌岸霜桃紅壓墻鴟夷倘在此未必入滄浪其三水次揭危亭煙堤四面平栽蘆延宿鷺種栁待啼鸎雪霽清流漲風來野艇横輕肥莫臨顧我老懶逢迎和梅摯北池十詠池上有虚閣翬簷迅若翔百壺多盛集四座仰惟良蘚印文綦緑蓮依桂楫香何由陪嘯咏敷袵納微凉其二池上有竒檜青青嵗紀深舊枝憐茂植時亦助清吟夕月漏孤影秋霜滋勁心今方遇真賞風什播瑤音其三池上有孤島影搖波底天蓬壺欣髣髴仙客得留連岸草襯丹轂灘蘆偎畫船羨君休澣日寄傲一尊前其四池上有修竹遥聞手自栽幾因風韻響時感隼旟來粉籜經梅脱虬根遇石回嬋娟緑隂下小閣為誰開其五池上有垂栁煙籠濯濯枝芳根逢茂育老翠勝平時體弱因風舞詞清入篴吹金城久不到遥想歎羇離其六池上有叢菊繁英滿舊蹊金刀惜頻翦粉蝶得幽棲醉卉誰同挿香牋手自題遥思清賞處野步岸東西其七池上有時釣閒忘侍從身波平方浸月吏退閴無人藻映魴魚尾風揺獨繭綸一亭容膝地雅飾免荒蓁其八池上有時宴笙簧沸欲凝歡多漏移刻坐久月和燈席客詠持蠏女娼歌采菱醉來忘萬事風靜水波澄其九池上有雛鶴來從淮水壖舊巢離海樹清唳入吳天骨峭翹霜月翎疎刷野泉使君宜得伴仙格本千年其十池上有馴鹿亭臺深處行長隨熊軾慣且免兎罝驚遥草眠多穏流泉飲亦清寸岑有靈囿可使遂微生詠金竹百鎰光寒一徑深潛疑造化鑄成林貪夫或有凭䦨者不見修篁但見金吳淞江江人見我謂誰何行李無羇野意多六幅青帆趂潮去一罇白酒扣舷歌沙邊厯厯辨雲樹島外濺濺弄月波興盡歸來還更喜舞鷗相送入煙蘿其二長橋觀魚曙光東向欲曨明漁艇縱横暎逺汀濤面白煙昏落月嶺頭殘燒混疎星鳴榔莫觸蛟龍睡舉網時聞魚鼈腥我實宦游無况者擬來隨爾帶笭箵其三中秋對月月晃長江上下同畫橋横截冷光中雲頭艶艶開金餅水面沉沉卧彩虹佛氏解為銀色界仙家多住玉壺中地雄景勝言不盡但欲追隨乗曉風附和蔣希魯前題失名春後銀魚霜下鱸逺人曾到合思吳欲圖江色不上筆靜覔鳥聲深在蘆落日未昏聞市散青天都盡見山孤橋南水漲虹垂影清夜光明合太湖絶句歸來深隠太湖濵天與扶持百嵗身雖是浮雲隔雙闕丹心愛戴在君親吳江橋雁翅橋横五湖北翬飛亭屹大江心魚龍淵藪風月窟若比廣寒宫更深堯峯新井歌并序堯峯顥暹禪師有道行居常遊吳門一日且曰山中鑿石造井踰嵗僅成既冽而甘大為叢林之利願得紀述以久其傳因作歌云白雲莽莽青山頭一穴四面飛泉流其初山間舊井涸枯腸燥吻海衆羞於時大士寶雲者頥指土脈智慮周山靈所感道心爽檀施聿來工力鳩雲鍤齊下逺雷動石火内擊飛星稠百尺虚空廓地表鑿井求水出土一尺即百尺虚空見内書一泓清冽呀深幽人疑從天隨月窟或問何處移龍湫次則其徒駭殊勝競持應器嘗甘柔饑狖連臂喜跳擲渴鳥引喙鳴鈎輈碧甃光中轆轤曉銀床側畔梧桐秋寶方金地互相映谷鮒坎蛙難此留傍睨江形小衣帶下窺湖面卑浮漚何茲鑿飲有功利一掬入口醍醐優熱者濯之昏鈍决病者沃之沈痼瘳而我時邀墨客去松澗逺挈都籃游淨瓶汲引試香荈雅具羅列無腥甌茶經膻鼎腥甌非器也比之玉乳不差别曲阿有玉乳泉誚彼鍊丹多謬悠俗傳天竺有鍊丹泉而茶經水記皆不載今茲泉眼在魯塢所喜雲液隣莵裘魯塢乃堯峯地予所居去之一舍苧翁既往乏鑒者水記未載予將修此山此井永不廢此歌其庶傳南州再題半峯亭何名半峯亭堯峯路之半遊客趨層崖斗上多股戰寶雲構茲軒接引心不倦所冀冠葢來少休松石畔雄視金仙居巍乎倚雲漢自此更攀縁須臾躋彼岸題山亭山亭深處枕清溪萬目回環盡翠微梅蕚破香知臘近栁梢含緑認春歸風前列嶂琴三疊雪後羣山玉四圍顧我此來盤礴久塵勞瀟灑頓忘機過葛墟讀蔣冽大宗碑天寶年中立此碑軒裳鱗次美當時自從寂絶牛頭夢力振家聲合在茲虎丘山林端生色美新晴樓閣依山若畫屏石坐最宜人選勝劍池潛想地遺靈僧窓松竹冬猶茂寺路煙霞晝亦㝠自愧逾年假麾守一迴方得扣禪扃再熟稻嚮日草青牛引犢經秋田熟稻生孫闕泰伯廟泰伯何為者不以身為身遜避天下位奔走句吳濵隠德昭來世遺祀傳斯民吁此亷讓國合生亷讓人題月禪師方丈我到雲房是有縁坐移蓮刻聽禪詮江邊異日人應記吏部曽來見大顛秀野亭秀野亭連小隠堂紅蕖緑篠媚滄浪卞山居士無歸意卻借吳儂作醉鄉梅玉骨絶纎塵前身清淨身無花能伯仲得雪愈精神冷淡溪橋曉殷勤江路春寒郊痩島外同氣更何人梔子花時六嵗作庭前梔子樹四畔有椏杈未結黄金子先開白玉花景祐丁丑創曲水亭寮屬同賦一派西園曲水聲水邊終日㑹冠纓幾多詩筆無停綴不似當年有罰觥又危構􅘳奫淪清宜滌世紛飛湍逢石轉潄玉隔山聞影亂林花落山叢磵草熏茲為褉飲地何羨右將軍嘉祐院在台州老被詩名繫此身思深山去避人羣寶臺千尺隔江見清磬一聲歸路聞巖上開扉燈照月菴前掃地雪和雲終焉此是清凉處淨住無慚相國文宋㕘政庠蘇州府重修大㕔記姑蘇受署㕔新成當兵部員外郎李公晉卿守屏之明年冬十月也政修事舉所至精明完葺之初見梁間有題識乃有唐乾寧元年刺史成及所建乾寧距聖宋一百六十有餘年矣刺是郡者接跡不絶凡受署訖即臨便閣煩鞅沉迷其於㕔事或旬日不一至以至年禩寖逺棟將撓焉余昔兩綰蘇印班禄餘閒每浚隍濠構臺榭以館過賔以備宴衎以追韋白二公風跡雖自以為適然於是㕔繕完有所未至今觀李公之為有過人者圖新補廢俾唐末之遺構巍乎顯明吏民瞻之靡不胥悦君子謂李公急於先務知布政之本焉余目是事憮然自咎因書本末云時皇祐六年三月日記附傳蔣堂字希魯常州宜興人擢進士第為楚州團練推官滿嵗吏部引對真宗覽所試判善之特授大理寺丞知臨川縣縣富人李甲多為不法前令莫能制堂戒諭不悛白州以兵索其家得僭乗輿物置於死厯通判眉許吉楚州以太常博士知泗州召為監察御史禁中火有司請究所起多引宫人屬吏堂言火起無迹安知非天意也陛下宜修德應變有司乃欲歸咎宫人以之屬吏何求不可而遂賜之死是重天譴也詔原之論奏郭皇后不當廢坐貶再遷侍御史判三司度支句院出為江南東路轉運使徙淮南無江淮發運事特廢發運使上封者屢以為非便堂言唐裴耀卿劉晏第五琦李巽裴休皆常為江淮河南轉運使不聞别置使名國朝卞衮王嗣宗劉師道亦止為轉運兼領發運司事而嵗輸京師常足時雖用其議後卒復在江淮嵗薦部吏二百人或謂曰一有謬舉且得罪何以多為堂曰十得二三亦足報國坐失按蘄州王䝉正故入部吏死罪降知越州州之鑑湖馬臻所為溉田八千頃食利者萬家前守建言聽民自占多為豪右所侵堂奏復之徙蘇州入判刑部徙戸部句院厯户部度支鹽鐵副使安撫梓夔路擢天章閣待制江淮制置發運使先是發運使上計進大舟數十載江湖物入遺京師權貴堂曰吾豈為此嵗入自可附驛奏也前後五年未嘗一至京師就除河東路都轉運使未行知洪州改應天府累遷左司郎中知杭州以樞密直學士知益州慶厯初詔天下建學漢文翁石室在孔子廟中堂因廣其舍為學宫選屬官以教諸生士人翕然稱之楊日嚴在蜀有能名堂素不樂之於是節遊宴減厨傳專尚寛縱頗變日嚴之政又建銅壺閣其制宏敞而材不預具功既半乃伐喬木於蜀先主惠陵江瀆祠又毁后土及劉禪祠蜀人浸不悦獄訟滋多久之或以為私官妓徙河中府又徙杭州蘇州以尚書禮部侍郎致仕卒特贈吏部侍郎堂為人清修純飭遇事毅然不屈貧而樂施好學工文辭延譽晩進至老不倦尤嗜作詩有吳門集二十巻春卿遺稿
